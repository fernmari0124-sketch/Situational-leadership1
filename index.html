# Situational-leadership1
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Situational Leadership — Interactive Grid</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #1D9E75; --teal-light: #E1F5EE; --teal-mid: #9FE1CB; --teal-dark: #0F6E56;
    --amber: #BA7517; --amber-light: #FAEEDA; --amber-mid: #FAC775; --amber-dark: #854F0B;
    --blue: #185FA5; --blue-light: #E6F1FB; --blue-mid: #B5D4F4; --blue-dark: #0C447C;
    --coral: #993C1D; --coral-light: #FAECE7; --coral-mid: #F5C4B3; --coral-dark: #712B13;
    --gray: #5F5E5A; --gray-light: #F1EFE8; --gray-mid: #D3D1C7;
    --text: #2C2C2A; --text-muted: #888780; --bg: #FDFCF9;
    --radius: 10px; --font: 'DM Sans', sans-serif; --serif: 'DM Serif Display', serif;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    padding: 0.5rem;
    margin: 0;
  }

  .page { width: 100%; max-width: 420px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 0.5rem; }

  .header h1 {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 2px;
    letter-spacing: -.02em;
  }

  .header p { font-size: 10px; color: var(--text-muted); }

  .hint {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    margin-bottom: 0.5rem;
    font-size: 10px;
    color: var(--text-muted);
  }

  .hint-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--teal);
    color: white;
    font-size: 8px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(29,158,117,.4); }
    50% { box-shadow: 0 0 0 4px rgba(29,158,117,0); }
  }

  .grid-container {
    display: grid;
    grid-template-columns: 20px 1fr 1fr;
    grid-template-rows: 1fr 1fr 20px;
    gap: 5px;
    width: 100%;
    aspect-ratio: 1.1;
  }

  .y-axis {
    grid-row: 1 / 3;
    grid-column: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .y-axis span {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-size: 7px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: .06em;
    text-transform: uppercase;
  }

  .x-axis-low, .x-axis-high {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 7px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: .06em;
    text-transform: uppercase;
  }

  .corner { background: transparent; }

  .quadrant {
    position: relative;
    border-radius: var(--radius);
    padding: 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-end;
    transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s;
    border: 1.5px solid transparent;
    overflow: hidden;
  }

  .quadrant::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    opacity: 0;
    transition: opacity .2s;
    border-radius: var(--radius);
  }

  .quadrant:hover { transform: scale(1.02); }
  .quadrant:hover::before { opacity: 1; }
  .quadrant.active { transform: scale(1.02); }

  .q-s3 { background: var(--teal-light); border-color: var(--teal-mid); grid-row:1; grid-column:2; }
  .q-s3::before { background: linear-gradient(135deg, rgba(29,158,117,.08) 0%, transparent 60%); }
  .q-s3:hover, .q-s3.active { box-shadow: 0 0 0 2px var(--teal); }

  .q-s2 { background: var(--amber-light); border-color: var(--amber-mid); grid-row:1; grid-column:3; }
  .q-s2::before { background: linear-gradient(135deg, rgba(186,117,23,.08) 0%, transparent 60%); }
  .q-s2:hover, .q-s2.active { box-shadow: 0 0 0 2px var(--amber); }

  .q-s4 { background: var(--blue-light); border-color: var(--blue-mid); grid-row:2; grid-column:2; }
  .q-s4::before { background: linear-gradient(135deg, rgba(24,95,165,.08) 0%, transparent 60%); }
  .q-s4:hover, .q-s4.active { box-shadow: 0 0 0 2px var(--blue); }

  .q-s1 { background: var(--coral-light); border-color: var(--coral-mid); grid-row:2; grid-column:3; }
  .q-s1::before { background: linear-gradient(135deg, rgba(153,60,29,.08) 0%, transparent 60%); }
  .q-s1:hover, .q-s1.active { box-shadow: 0 0 0 2px var(--coral); }

  .q-number {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 400;
    line-height: 1;
    opacity: .15;
    position: absolute;
    top: 6px;
    right: 8px;
  }

  .q-s3 .q-number { color: var(--teal-dark); }
  .q-s2 .q-number { color: var(--amber-dark); }
  .q-s4 .q-number { color: var(--blue-dark); }
  .q-s1 .q-number { color: var(--coral-dark); }

  .q-style-tag {
    font-size: 7px;
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
    padding: 2px 5px;
    border-radius: 3px;
    margin-bottom: 3px;
  }

  .q-s3 .q-style-tag { background: var(--teal-mid); color: var(--teal-dark); }
  .q-s2 .q-style-tag { background: var(--amber-mid); color: var(--amber-dark); }
  .q-s4 .q-style-tag { background: var(--blue-mid); color: var(--blue-dark); }
  .q-s1 .q-style-tag { background: var(--coral-mid); color: var(--coral-dark); }

  .q-name { font-size: 11px; font-weight: 600; margin-bottom: 2px; }

  .q-s3 .q-name { color: var(--teal-dark); }
  .q-s2 .q-name { color: var(--amber-dark); }
  .q-s4 .q-name { color: var(--blue-dark); }
  .q-s1 .q-name { color: var(--coral-dark); }

  .q-maturity { font-size: 8px; color: var(--text-muted); line-height: 1.3; }

  .hotspot {
    position: absolute;
    top: 6px;
    left: 8px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: white;
    cursor: pointer;
    z-index: 2;
  }

  .q-s3 .hotspot { background: var(--teal); animation: pulse-teal 2s ease-in-out infinite; }
  .q-s2 .hotspot { background: var(--amber); animation: pulse-amber 2s ease-in-out infinite .5s; }
  .q-s4 .hotspot { background: var(--blue); animation: pulse-blue 2s ease-in-out infinite 1s; }
  .q-s1 .hotspot { background: var(--coral); animation: pulse-coral 2s ease-in-out infinite 1.5s; }

  @keyframes pulse-teal { 0%,100%{box-shadow:0 0 0 0 rgba(29,158,117,.4)} 50%{box-shadow:0 0 0 4px rgba(29,158,117,0)} }
  @keyframes pulse-amber { 0%,100%{box-shadow:0 0 0 0 rgba(186,117,23,.4)} 50%{box-shadow:0 0 0 4px rgba(186,117,23,0)} }
  @keyframes pulse
